<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f43f5e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- monogram badge -->
  <circle cx="130" cy="150" r="56" fill="url(#accent)"/>
  <text x="130" y="168" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#ffffff" text-anchor="middle">RA</text>

  <text x="90" y="290" font-family="Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff">Rayhan Ahmed</text>
  <text x="90" y="345" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="#f5f5f5" opacity="0.85">SEO Expert &amp; Digital Marketing Specialist</text>

  <rect x="90" y="390" width="3" height="60" fill="url(#accent)"/>
  <text x="115" y="420" font-family="Arial, sans-serif" font-size="24" font-weight="500" fill="#d4d4d4">Rayhan Digital Hub — Dhaka, Bangladesh</text>

  <text x="90" y="560" font-family="Arial, sans-serif" font-size="22" font-weight="500" fill="#a3a3a3">rayhandigitalhub.com</text>
</svg>
